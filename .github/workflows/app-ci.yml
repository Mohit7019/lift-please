name: App CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: lift-please
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'   # ✅ stable
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "No lint script"

      - name: Unit tests
        run: npm test || echo "No tests"

      - name: Start app for integration test
        run: |
          npm start &
          APP_PID=$!
          echo $APP_PID > app.pid
          sleep 2

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -f -s http://localhost:3000/health > /dev/null; then
              echo "App is ready"
              exit 0
            fi
            sleep 1
          done
          echo "App failed"
          exit 1

      - name: Integration test
        run: curl -f http://localhost:3000/health

      - name: Stop app
        if: always()
        run: |
          if [ -f app.pid ]; then
            kill $(cat app.pid) || true
          fi

  build:
    name: Build & Scan
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t lift-please:${{ github.sha }} .

      - name: Scan image
        uses: aquasecurity/trivy-action@v0.24.0   # ✅ fixed version
        with:
          image-ref: lift-please:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: 1

  deploy:
    name: Deploy to ECR
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::503668361641:role/GitHubActionsTerraformRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}